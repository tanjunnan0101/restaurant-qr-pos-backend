name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/restaurant_pos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate backend
        run: npm run check

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production API image
        run: docker build -f infra/Dockerfile.api -t restaurant-pos-api:${{ github.sha }} .
